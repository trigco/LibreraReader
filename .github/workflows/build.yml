name: Android CI (Librera Custom Build)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create Setup Files (local.properties & keystore)
      run: |
        # ১. সার্ভারে আগে থেকেই থাকা Android SDK-এর লোকেশন দেখিয়ে দেওয়া
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        # ২. ডামি কিস্টোর ফাইল তৈরি করা (যাতে বিল্ড ক্র্যাশ না করে)
        echo "storeFile=mock.jks" > keystore.properties
        echo "storePassword=mock_password" >> keystore.properties
        echo "keyAlias=mock_alias" >> keystore.properties
        echo "keyPassword=mock_password" >> keystore.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Librera-Debug-APKs
        path: app/build/outputs/apk/**/*.apk
