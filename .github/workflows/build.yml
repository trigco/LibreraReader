name: Android CI (Librera Properties Fixed)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Create Setup Files (local.properties & Exact keystore properties)
      run: |
        # ১. Android SDK-এর ডিফল্ট লোকেশন সেট করা
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        # ২. অরিজিনাল build.gradle যে নির্দিষ্ট ভ্যারিয়েবলগুলো খুঁজছে, হুবহু সেই নামে ডামি ডেটা তৈরি করা
        echo "RELEASE_STORE_FILE=mock.jks" > keystore.properties
        echo "RELEASE_STORE_PASSWORD=mock_password" >> keystore.properties
        echo "RELEASE_KEY_ALIAS=mock_alias" >> keystore.properties
        echo "RELEASE_KEY_PASSWORD=mock_password" >> keystore.properties
        
        # কিছু প্রোজেক্টে ছোট হাতের অক্ষরেও খুঁজতে পারে, তাই নিরাপদ থাকার জন্য দুই ফরম্যাটই রাখা হলো
        echo "storeFile=mock.jks" >> keystore.properties
        echo "storePassword=mock_password" >> keystore.properties
        echo "keyAlias=mock_alias" >> keystore.properties
        echo "keyPassword=mock_password" >> keystore.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Librera-Debug-APKs
        path: app/build/outputs/apk/**/*.apk
