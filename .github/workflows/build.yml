name: Android CI (Librera Custom Build)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Android SDK, Tools and Create local.properties
      run: |
        set -eux
        export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"
        mkdir -p "${ANDROID_SDK_ROOT}"
        cd "${ANDROID_SDK_ROOT}"
        curl -sSfL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o cmdline-tools.zip
        unzip -q cmdline-tools.zip -d cmdline-tools
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/cmdline-tools/* cmdline-tools/latest/ || true
        export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${PATH}"
        yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses
        sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        echo "sdk.dir=${ANDROID_SDK_ROOT}" > ${{ github.workspace }}/local.properties

    - name: Mock Missing keystore.properties (To bypass Build Error)
      run: |
        if [ ! -f "keystore.properties" ]; then
          echo "storeFile=mock.jks" > keystore.properties
          echo "storePassword=mock_password" >> keystore.properties
          echo "keyAlias=mock_alias" >> keystore.properties
          echo "keyPassword=mock_password" >> keystore.properties
          echo "keystore.properties created successfully for CI bypass."
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Librera-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
