name: Android CI (Librera Fixed Build)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # গ্রেডলের সাথে সামঞ্জস্য রাখতে Java 11 সেটআপ (প্রয়োজনে ১৭ ট্রাই করা যাবে)
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Create Setup Files (local.properties & keystore)
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        if [ ! -f "keystore.properties" ]; then
          echo "storeFile=mock.jks" > keystore.properties
          echo "storePassword=mock_password" >> keystore.properties
          echo "keyAlias=mock_alias" >> keystore.properties
          echo "keyPassword=mock_password" >> keystore.properties
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # JAVA_HOME এনভায়রনমেন্ট ভ্যারিয়েবল সহ গ্রেডল রান করা
    - name: Build Debug APK
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Librera-Debug-APKs
        path: app/build/outputs/apk/**/*.apk
